<body style="height: 100%; margin: 0">
  <div id="container" style="height: 100%"></div>

  
  <script type="text/javascript" src="https://fastly.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>

  <!-- Uncomment this line if you want to use gl extension

  <!-- Uncomment this line if you want to echarts-stat extension
  <script type="text/javascript" src="https://echarts.apache.org/zh/js/vendors/echarts-stat/dist/ecStat.min.js"></script>

  <!-- Uncomment this line if you want to echarts-graph-modularity extension
  <script type="text/javascript" src="https://echarts.apache.org/zh/js/vendors/echarts-graph-modularity/dist/echarts-graph-modularity.min.js"></script>

  <!-- Uncomment this line if you want to use map

  <script type="text/javascript" src="https://api.map.baidu.com/api?v=3.0&ak=YOUR_API_KEY"></script>
  <script type="text/javascript" src="https://fastly.jsdelivr.net/npm/echarts@5/dist/extension/bmap.min.js"></script>
  -->

  <script type="text/javascript">
    var dom = document.getElementById('container');
    var myChart = echarts.init(dom, null, {
      renderer: 'canvas',
      useDirtyRect: false
    });
    var app = {};
    
    var option;

    const years = [
  1980, 1981, 1982, 1983, 1984, 1985, 1986, 1987, 1988, 1989, 
  1990, 1991, 1992, 1993, 1994, 1995, 1996, 1997, 1998, 1999, 
  2000, 2001, 2002, 2003, 2004, 2005, 2006, 2007, 2008, 2009, 
  2010, 2011, 2012, 2013, 2014, 2015, 2016, 2017, 2018, 2019
];
const hongkongDataRaw = [
  0.12886, 0.13104, 0.11574, 0.07239, 0.05949, 0.06171, 0.06490, 0.06957, 0.08096, 0.08664, 
  0.09288, 0.09045, 0.09765, 0.10294, 0.11750, 0.09458, 0.09746, 0.10247, 0.09063, 0.07116, 
  0.050, 0.046, 0.043, 0.040, 0.041, 0.044, 0.043, 0.045, 0.052, 0.055, 
  0.051, 0.056, 0.058, 0.050, 0.050, 0.050, 0.051, 0.050, 0.046, null
];
const shenzhenDataRaw = [
  -0.02547, -0.02324, -0.02240, -0.02424, -0.02691, -0.03782, -0.03703, -0.03103, -0.04026, -0.04654, 
  -0.05324, -0.06565, -0.07458, -0.07254, -0.07440, -0.07991, -0.08024, -0.07338, -0.06877, -0.06540, 
  -0.07144, -0.07210, -0.07785, -0.08747, -0.09448, -0.08835, -0.08787, -0.08852, -0.06167, -0.08034, 
  -0.07544, -0.07299, -0.08247, -0.07871, -0.07903, -0.08551, -0.08716, -0.08322, -0.08586, -0.08484
];

const processTo3Decimals = (data) => {
    if (data === null) return null;
    return parseFloat(data.toFixed(3));
};

const hongkongData = hongkongDataRaw.map(processTo3Decimals);
const shenzhenData = shenzhenDataRaw.map(processTo3Decimals);

const combinedData = years.map((year, index) => {
    return [shenzhenData[index], hongkongData[index], index];
});

const labelYears = [1980, 1984, 1996, 2003, 2012, 2018];

// 背景网格配置
const gridConfig = {
    columnCount: 4,
    percentStep: 0.0457, // 10% 间隔
    baseColor: '#EDEDED',
    lineColor: '#e0e0e0', // 竖线颜色
    gradientStart: '#EFEFEF',
    gradientEnd: '#ffffff'
};

function renderGridBars(params, api) {
    const yIndex = api.value(2);
    const szValue = api.value(0);
    const hkValue = api.value(1);
    const year = years[yIndex];

    const yCoord = api.coord([0, yIndex])[1];
    const onePercentWidth = api.size([0.004, 0])[0];
    const tenPercentWidth = api.size([gridConfig.percentStep, 0])[0];
    const barHeight = api.size([0, 1])[1] * 0.92;
    const centerX = api.coord([0,0])[0];
    const centerGap = 6.5;
    const majorGap = 3;
    const minorGap = 0.5;
    const chartHeight = api.size([0, years.length])[1];
    const gapSize = 0.5; // 10%背景间隔（仅新增）

    let children = [];

    // 绘制背景色块 + 10%间隔竖线
    const drawBackgroundGrid = () => {
        // 左侧（深圳）背景
        for (let col = 1; col <= gridConfig.columnCount; col++) {
            const startX = centerX - centerGap/2 - col * tenPercentWidth + gapSize;
            const endX = startX + tenPercentWidth;
            
            const isGradient = col === gridConfig.columnCount;
            
            children.push({
                type: 'rect',
                shape: { x: startX, y: yCoord - barHeight/2, width: tenPercentWidth - gapSize*2, height: barHeight },
                style: isGradient ? {
                    fill: {
                        type: 'linear', x: 0, y: 0, x2: 1, y2: 0,
                        colorStops: [
                            { offset: 0.4, color: gridConfig.gradientEnd },
                            { offset: 1, color: gridConfig.gradientStart }
                        ]
                    }
                } : { fill: gridConfig.baseColor },
                z: 0
            });
        }

        // 右侧（香港）背景
        for (let col = 1; col <= gridConfig.columnCount; col++) {
            const startX = centerX + centerGap/2 + (col-1) * tenPercentWidth + gapSize;
            const endX = startX + tenPercentWidth;
            
            const isGradient = col === gridConfig.columnCount;
            
            children.push({
                type: 'rect',
                shape: { x: startX, y: yCoord - barHeight/2, width: tenPercentWidth - gapSize*2, height: barHeight },
                style: isGradient ? {
                    fill: {
                        type: 'linear', x: 0, y: 0, x2: 1, y2: 0,
                        colorStops: [
                            { offset: 0, color: gridConfig.gradientStart },
                            { offset: 0.7, color: gridConfig.gradientEnd },
                            { offset: 1, color: gridConfig.gradientEnd }
                        ]
                    }
                } : { fill: gridConfig.baseColor },
                z: 0
            });
        }

        // 绘制 10% 间隔竖线（贯穿整个图表高度）
        if (yIndex === 0) {
            // 左侧竖线
            for (let i = 1; i <= gridConfig.columnCount; i++) {
                const x = centerX - centerGap/2 - i * tenPercentWidth;
                children.push({
                    type: 'line',
                    shape: { x1: x, y1: 0, x2: x, y2: chartHeight },
                    style: { stroke: gridConfig.lineColor, lineWidth: 1 },
                    z: 0
                });
            }
            // 右侧竖线
            for (let i = 1; i <= gridConfig.columnCount; i++) {
                const x = centerX + centerGap/2 + (i-1) * tenPercentWidth;
                children.push({
                    type: 'line',
                    shape: { x1: x, y1: 0, x2: x, y2: chartHeight },
                    style: { stroke: gridConfig.lineColor, lineWidth: 1 },
                    z: 0
                });
            }
            // 中心线
            children.push({
                type: 'line',
                shape: { x1: centerX, y1: 0, x2: centerX, y2: chartHeight },
                style: { stroke: gridConfig.lineColor, lineWidth: 1 },
                z: 0
            });
        }
    };

    drawBackgroundGrid();

    const processData = (value, isPositive, color) => {
        if (value === null || value === undefined) return;
        
        const absValue = Math.abs(value);
        const blockCount = Math.floor((absValue / 0.01) + 1e-9);
        const remainder = absValue - blockCount * 0.01;
        const remainderWidth = (remainder / 0.01) * onePercentWidth;

        let currentPos = isPositive ? centerGap / 2 : -centerGap / 2;
        
        for (let i = 0; i < blockCount; i++) {
            const blockX = isPositive ? currentPos : currentPos - onePercentWidth;
            children.push({
                type: 'rect',
                shape: { x: centerX + blockX, y: yCoord - barHeight / 2, width: onePercentWidth, height: barHeight },
                style: { fill: color },
                z: 2
            });
            const gap = (i + 1) % 5 === 0 ? majorGap : minorGap;
            currentPos += isPositive ? (onePercentWidth + gap) : -(onePercentWidth + gap);
        }
        
        if (remainderWidth > 0.1) {
            const blockX = isPositive ? currentPos : currentPos - remainderWidth;
            children.push({
                type: 'rect',
                shape: { x: centerX + blockX, y: yCoord - barHeight / 2, width: remainderWidth, height: barHeight },
                style: { fill: color },
                z: 2
            });
            currentPos += isPositive ? remainderWidth : -remainderWidth;
        }
    };

    processData(szValue, false, '#17A5C5');
    processData(hkValue, true, '#C13B2E');
    
    return { type: 'group', children };
}

option = {
    tooltip: {
        trigger: 'axis',
        axisPointer: { type: 'shadow' },
        formatter: (params) => {
            const dataIndex = params[0].dataIndex;
            const year = years[dataIndex];
            let tooltipStr = `${year}<br/>`;
            const szVal = shenzhenData[dataIndex];
            const hkVal = hongkongData[dataIndex];
            if (szVal !== null) {
                tooltipStr += `<span style="display:inline-block;margin-right:5px;border-radius:10px;width:10px;height:10px;background-color:#5ab3c2;"></span>Shenzhen: ${Math.abs(szVal * 100).toFixed(1)}%<br/>`;
            }
            if (hkVal !== null) {
                tooltipStr += `<span style="display:inline-block;margin-right:5px;border-radius:10px;width:10px;height:10px;background-color:#d76358;"></span>Hong Kong: ${(hkVal * 100).toFixed(1)}%<br/>`;
            }
            return tooltipStr;
        }
    },
    legend: { show: false },
    grid: {
        left: '160',
        right: '150',
        top: '120',
        bottom: '80',
    },
    dataZoom: [
        {
            type: 'slider',
            yAxisIndex: 0,
            zoomLock: true,
            width: 15,
            right: 10,
            start: 0,
            end: 80,
            handleSize: 0,
            showDetail: false,
            borderColor: 'transparent',
            backgroundColor: '#f0f0f0',
            fillerColor: '#ccc'
        }
    ],
    xAxis: {
        type: 'value',
        min: -0.4,
        max: 0.4,
        axisLine: { show: false },
        axisTick: { show: false },
        axisLabel: { show: false },
        splitLine: { show: false }
    },
    yAxis: {
 type: 'category',
 data: years,
 inverse: true,
 axisLine: { show: false },
 axisTick: { show: false },
 axisLabel: { 
     show: false
 },
 splitLine: { show: false }
 },
 series: [
 {
 name: 'Data',
 type: 'custom',
 renderItem: renderGridBars,
 data: combinedData,
 encode: { y: 2 }
 }
 ]
};

    if (option && typeof option === 'object') {
      myChart.setOption(option);
    }

    window.addEventListener('resize', myChart.resize);
  </script>
</body>
</html>
